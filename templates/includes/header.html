<header class="bg-white shadow-md">
    <div class="container mx-auto px-6 py-4">
        <div class="flex items-center justify-between">
            <!-- Логотип -->
            <div class="text-xl font-bold text-gray-800">News</div>

            <!-- Десктопное меню -->
            <ul class="hidden md:flex space-x-8 items-center">
                <li><a href="{% url 'home' %}" class="text-gray-600 hover:text-gray-900">Home</a></li>
                <li><a href="{% url 'news' %}" class="text-gray-600 hover:text-gray-900">News</a></li>
                <li>
                    <a href="{% url 'add_news' %}" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        Add News
                    </a>
                </li>
            </ul>

            <!-- Кнопка мобильного меню -->
            <button id="menu-btn" class="md:hidden text-gray-600 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>

        <!-- Мобильное меню -->
        <div id="mobile-menu" class="hidden md:hidden mt-4 bg-white rounded-2xl shadow-lg p-4">
            <ul class="flex flex-col space-y-3">
                <li>
                    <a href="{% url 'home' %}" class="block px-4 py-2 rounded-lg text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">
                        Home
                    </a>
                </li>
                <li>
                    <a href="{% url 'news' %}" class="block px-4 py-2 rounded-lg text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">
                        News
                    </a>
                </li>
                <li>
                    <a href="{% url 'add_news' %}" class="block px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition text-center">
                        Add News
                    </a>
                </li>
            </ul>
        </div>
    </div>
</header>

<script>
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('mobile-menu');

    btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
    });
</script>
