{% extends 'base.html' %}

{% block title %}
    Add News
{% endblock %}

{% block content %}
<main class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 py-40 px-4">
    <div class="max-w-2xl mx-auto">

        <!-- Form Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-8 py-6">
                <h1 class="text-2xl font-bold text-white flex items-center gap-3">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z">
                        </path>
                    </svg>

                    Create News
                </h1>

                <p class="text-blue-100 text-sm mt-2">
                    Fill in the information to publish a new article
                </p>
            </div>


            <!-- Form -->
            <form class="px-8 py-8" method="post">
                {% csrf_token %}
                <!-- Title -->
                <div class="mb-6">

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        News Title
                        <span class="text-red-500">*</span>
                    </label>

                    <div class="relative">

                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M4 6h16M4 12h16M4 18h7">
                                </path>
                            </svg>
                        </div>
   
                        <input
                                name="title"
                                type="text"
                                placeholder="Example: Important system update"
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                        >

                    </div>

                    <p class="text-xs text-gray-500 mt-1">
                        Short and clear title
                    </p>

                </div>



                <!-- Content -->
                <div class="mb-8">

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Content
                        <span class="text-red-500">*</span>
                    </label>

                    <div class="relative">

                        <div class="absolute top-3 left-3 pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M4 6h16M4 12h16M4 18h7">
                                </path>
                            </svg>
                        </div>
 
                        <textarea
                                name="text"
                                rows="6"
                                placeholder="Write the news details here..."
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200 resize-none"
                        ></textarea>

                    </div>

                    <p class="text-xs text-gray-500 mt-1">
                        Text formatting is supported
                    </p>

                </div>



                <!-- Buttons -->
                <div class="flex items-center gap-4">

                    <button
                            type="submit"
                            class="flex-1 bg-gradient-to-r from-blue-600 to-blue-700 text-white px-6 py-3 rounded-xl hover:from-blue-700 hover:to-blue-800 transform hover:scale-[1.02] transition-all duration-200 font-semibold shadow-lg shadow-blue-200">

                        <div class="flex items-center justify-center gap-2">

                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 4v16m8-8H4">
                                </path>
                            </svg>

                            Publish News

                        </div>

                    </button>


                    <button
                            type="reset"
                            class="px-6 py-3 border border-gray-300 rounded-xl hover:bg-gray-50 transition duration-200 text-gray-700 font-medium">

                        Clear

                    </button>

                </div>

            </form>

        </div>



        <!-- Info -->
        <div class="mt-6 text-center">

            <p class="text-xs text-gray-500">
                After publishing, the news will be visible to all users
            </p>

        </div>

    </div>
</main>

{% endblock %}
